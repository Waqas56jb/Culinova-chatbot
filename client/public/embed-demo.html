<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Culinova chat embed demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, 'Times New Roman', serif;
        background: linear-gradient(160deg, #f7f3ea 0%, #e8e0d0 45%, #d9cfc0 100%);
        color: #1a1610;
      }
      main {
        max-width: 42rem;
        margin: 0 auto;
        padding: 4rem 1.5rem 8rem;
      }
      h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      p {
        font-size: 1.125rem;
        line-height: 1.6;
        opacity: 0.85;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
        background: rgba(0, 0, 0, 0.06);
        padding: 0.15em 0.4em;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Your website</h1>
      <p>
        This page simulates a customer site. The gold chat button in the corner is the
        Culinova embed widget (<code>embed.js</code>).
      </p>
    </main>

    <!-- Embed code (same snippet customers paste) -->
    <script
      src="./embed.js"
      data-position="right"
      async
    ></script>
  </body>
</html>
